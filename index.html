/* ── Responsive Layout ─────────────────────────────────── */

/* Desktop : sidebar visible, main prend le reste */
.app-layout{display:flex;min-height:100vh}
.app-sidebar{width:228px;min-width:228px;flex-shrink:0}
.app-main{flex:1;padding:32px 40px;min-width:0;overflow-x:hidden;max-width:900px}

/* Tablette (769 → 1024px) : sidebar cachée, bottom nav */
@media(min-width:769px) and (max-width:1024px){
  .app-sidebar{display:none!important}
  .mobile-nav{display:flex!important}
  .app-main{padding:28px 28px calc(var(--nav-h) + 16px)!important;max-width:100%}
  .dash-hero h2{font-size:26px!important}
}

/* Mobile (≤768px) */
@media(max-width:768px){
  .app-sidebar{display:none!important}
  .mobile-nav{display:flex!important}
  .app-main{padding:20px 16px calc(var(--nav-h) + 12px)!important;max-width:100%}

  .dash-hero h2{font-size:22px!important}

  .person-actions{flex-direction:column!important;align-items:stretch!important}
  .person-actions button{width:100%!important;justify-content:center!important}
}

/* Petit mobile (≤480px) */
@media(max-width:480px){
  .app-main{padding:14px 12px calc(var(--nav-h) + 10px)!important}
  .dash-hero h2{font-size:19px!important}

  const [w, setW] = useState(() => typeof window !== 'undefined' ? window.innerWidth : 1200);
