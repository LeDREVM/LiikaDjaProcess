::selection{background:rgba(217,183,95,.28)}
.eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.gold-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold-border),transparent);margin:16px 0}
.lx-card{background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes goldShimmer{0%,100%{opacity:.7}50%{opacity:1}}
@media(max-width:768px){
nav{display:none!important}
.mobile-nav{display:block!important}
main{padding:20px 16px 80px!important}

function loadData(){

}
function saveData(d){localStorage.setItem('dja-liika-goals',JSON.stringify(d))}
function loadUI(){

}

// ─── Components ───

function ProgressRing({pct,size=48,stroke=4,color}){
const r=(size-stroke)/2;const circ=2*Math.PI*r;const off=circ-pct/100*circ;
return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border2)" strokeWidth={stroke}/>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset .5s ease'}}/>
</svg>
}

function StatCard({label,value,color,icon}){
return <div style={{background:'linear-gradient(160deg,var(--bg3),var(--bg2))',borderRadius:'var(--radius)',padding:'16px 20px',display:'flex',alignItems:'center',gap:14,border:'1px solid var(--border)',boxShadow:'var(--shadow)'}}>
<div style={{width:42,height:42,borderRadius:12,background:accentBg[color],border:`1px solid ${accentBorder[color]}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
<div><div style={{fontSize:11,color:'var(--text3)',marginBottom:3,letterSpacing:'.05em'}}>{label}</div>
<div style={{fontSize:22,fontWeight:600,color:'var(--text)'}}>{value}</div></div>
</div>
}

function ObjectiveCard({obj,color,onToggle,onProgress,onDelete}){
const accentVar=color==='dja'?'var(--accent-dja)':color==='liika'?'var(--accent-liika)':'var(--accent-couple)';
const bgVar=color==='dja'?'var(--accent-dja-bg)':color==='liika'?'var(--accent-liika-bg)':'var(--accent-couple-bg)';
return <div style={{background:'linear-gradient(160deg,var(--bg3),var(--bg2))',borderRadius:'var(--radius)',padding:'16px 20px',borderLeft:`3px solid ${obj.done?'var(--success)':accentVar}`,border:`1px solid var(--border)`,borderLeftWidth:3,borderLeftColor:obj.done?'var(--success)':accentVar,animation:'fadeUp .4s ease both',opacity:obj.done?.65:1,transition:'opacity .3s',boxShadow:'var(--shadow)'}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
<div style={{flex:1}}>
<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
<span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:bgVar,color:accentVar,fontWeight:500}}>{obj.cat}</span>
{obj.done&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:'var(--success-bg)',color:'var(--success)',fontWeight:500}}>Fait</span>}
</div>
<div style={{fontSize:15,fontWeight:500,marginBottom:4,textDecoration:obj.done?'line-through':'none'}}>{obj.title}</div>
<div style={{fontSize:13,color:'var(--text3)'}}>{obj.desc}</div>
</div>
<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
<ProgressRing pct={obj.progress} color={obj.done?'var(--success)':accentVar}/>
<span style={{fontSize:11,fontWeight:500,color:obj.done?'var(--success)':accentVar}}>{obj.progress}%</span>
</div>
</div>
<div style={{marginTop:12,display:'flex',alignItems:'center',gap:8}}>
<input type="range" min="0" max="100" step="5" value={obj.progress}
  onChange={e=>onProgress(obj.id,parseInt(e.target.value))}
  style={{flex:1,height:4,accentColor:accentVar,cursor:'pointer'}}/>
<button onClick={()=>onToggle(obj.id)} style={{background:obj.done?'var(--success-bg)':'var(--bg4)',border:'none',borderRadius:'var(--radius-xs)',padding:'6px 12px',fontSize:12,color:obj.done?'var(--success)':'var(--text2)',cursor:'pointer',whiteSpace:'nowrap'}}>
{obj.done?'Réactiver':'Valider'}</button>
<button onClick={()=>onDelete(obj.id)} aria-label="Supprimer" style={{background:'none',border:'none',fontSize:14,color:'var(--text3)',cursor:'pointer',padding:'6px'}}>✕</button>
</div>
</div>
}

function ActionItem({action,color,onToggle}){
const av=accent[color];
return <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:'linear-gradient(160deg,var(--bg3),var(--bg2))',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',cursor:'pointer',transition:'all .15s',animation:'slideIn .3s ease both'}} onClick={()=>onToggle(action.id)}>
<div style={{width:20,height:20,minWidth:20,borderRadius:6,border:action.done?'none':`2px solid var(--border2)`,background:action.done?'var(--success)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>
{action.done&&<span style={{color:'var(--bg)',fontSize:12,fontWeight:700}}>✓</span>}
</div>
<span style={{flex:1,fontSize:14,color:action.done?'var(--text3)':'var(--text)',textDecoration:action.done?'line-through':'none',transition:'all .2s'}}>{action.text}</span>
<span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:accentBg[color],color:av,fontWeight:500}}>{action.cat}</span>
</div>
}

function NotesPanel({who,notes,onAdd,onDelete}){
const [draft,setDraft]=useState('');
const av=accent[who];const bv=accentBorder[who];
const fmt=iso=>{const d=new Date(iso);return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});};
const submit=()=>{if(draft.trim()){onAdd(who,draft);setDraft('');}};
return <div style={{marginTop:32}}>
<div className="gold-rule" style={{marginBottom:20}}/>
<h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,marginBottom:14,color:'var(--gold2)',letterSpacing:'.02em'}}>Notes</h3>
<div style={{display:'flex',gap:8,marginBottom:16}}>
<textarea value={draft} onChange={e=>setDraft(e.target.value)}
  onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))submit();}}
  placeholder="Nouvelle note… (Ctrl+Entrée pour valider)"
  rows={3}
  style={{flex:1,background:'var(--bg3)',border:`1px solid ${bv}`,borderRadius:'var(--radius-sm)',padding:'10px 12px',color:'var(--text)',fontSize:13,resize:'vertical',outline:'none',fontFamily:'inherit',lineHeight:1.6}}/>
<button onClick={submit}
  style={{alignSelf:'flex-end',padding:'8px 14px',borderRadius:'var(--radius-sm)',border:'none',background:`linear-gradient(135deg,${av},${av}cc)`,color:'#06120d',cursor:'pointer',fontSize:12,fontWeight:700,whiteSpace:'nowrap',letterSpacing:'.04em'}}>
  + Ajouter
</button>
</div>
{!(notes||[]).length&&<p style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:'20px 0',fontStyle:'italic'}}>Aucune note pour l'instant.</p>}
<div style={{display:'flex',flexDirection:'column',gap:10}}>
{(notes||[]).map(n=><div key={n.id} style={{background:'linear-gradient(160deg,var(--bg3),var(--bg2))',border:`1px solid var(--border)`,borderLeft:`2px solid ${bv}`,borderRadius:'var(--radius-sm)',padding:'12px 14px',boxShadow:'var(--shadow)'}}>
  <p style={{fontSize:13,color:'var(--text)',lineHeight:1.65,whiteSpace:'pre-wrap',marginBottom:7}}>{n.text}</p>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
    <span style={{fontSize:10,color:'var(--text3)',fontFamily:"'Space Mono',monospace"}}>{fmt(n.date)}</span>
    <button onClick={()=>onDelete(who,n.id)} aria-label="Supprimer la note" style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:16,lineHeight:1,padding:'0 2px'}}>×</button>
  </div>
</div>)}
</div>
</div>;
}

function AddModal({show,onClose,onAdd,type,color}){
const [title,setTitle]=useState('');
const [desc,setDesc]=useState('');
const [cat,setCat]=useState('Carriere');
if(!show)return null;
const av=accent[color]||accent.dja;
const cats=color==='couple'?['Couple']:['Carriere','Sante','Finances','Perso'];
return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}} onClick={onClose}>
<div style={{background:'linear-gradient(160deg,var(--bg3),var(--bg2))',borderRadius:'var(--radius)',padding:28,maxWidth:440,width:'100%',border:'1px solid var(--gold-border)',boxShadow:'0 20px 60px rgba(0,0,0,.6)'}} onClick={e=>e.stopPropagation()}>
<h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,marginBottom:4,color:'var(--gold2)'}}>{type==='objective'?'Nouvel objectif':'Nouvelle action'}</h3>

function ChartPanel({data}){
const canvasRef=useRef(null);
const chartRef=useRef(null);
useEffect(()=>{
if(!canvasRef.current)return;
if(chartRef.current)chartRef.current.destroy();
const all=[...data.dja.objectives,...data.liika.objectives,...data.couple.objectives];
const cats=[...new Set(all.map(o=>o.cat))];
const avgByCat=cats.map(c=>{const items=all.filter(o=>o.cat===c);return Math.round(items.reduce((s,i)=>s+i.progress,0)/items.length)});
chartRef.current=new Chart(canvasRef.current,{
type:'bar',
data:{labels:cats,datasets:[{data:avgByCat,backgroundColor:['#8b5cf6','#34d399','#fbbf24','#f472b6','#60a5fa'],borderRadius:8,barPercentage:.6}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
y:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6e6a80',font:{family:'Outfit'}}},
x:{grid:{display:false},ticks:{color:'#a8a4b8',font:{family:'Outfit',weight:500}}}
}}
});
return ()=>{if(chartRef.current)chartRef.current.destroy()};
},[data]);
return <div style={{position:'relative',height:260}}><canvas ref={canvasRef}/></div>
}

function DoughnutPanel({data,who}){
const canvasRef=useRef(null);
const chartRef=useRef(null);
useEffect(()=>{
if(!canvasRef.current)return;
if(chartRef.current)chartRef.current.destroy();
const src=who==='couple'?data.couple.objectives:data[who].objectives;
const done=src.filter(o=>o.done).length;
const inProgress=src.filter(o=>!o.done&&o.progress>0).length;
const notStarted=src.filter(o=>!o.done&&o.progress===0).length;
chartRef.current=new Chart(canvasRef.current,{
type:'doughnut',
data:{labels:['Termines','En cours','A faire'],datasets:[{data:[done,inProgress,notStarted],backgroundColor:['#34d399','#8b5cf6','#2a2a3a'],borderWidth:0}]},
options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false}}}
});
return ()=>{if(chartRef.current)chartRef.current.destroy()};
},[data,who]);
return <div style={{position:'relative',height:200}}><canvas ref={canvasRef}/></div>
}

<span style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:'#4b6a55'}}>{v.label}</span>
</div>
))}
</div>
</div>;
}

// ─── Main App ───
function App(){
const [data,setData]=useState(loadData);
const [ui,setUI]=useState(loadUI);
const [view,setView]=useState('dashboard');
const [modal,setModal]=useState(null);
const [syncStatus,setSyncStatus]=useState('idle');

useEffect(()=>saveData(data),[data]);

const updateObj=useCallback((who,id,updates)=>{
setData(prev=>{
const next=clone(prev);
const list=who==='couple'?next.couple.objectives:next[who].objectives;
const idx=list.findIndex(o=>o.id===id);
if(idx>=0)Object.assign(list[idx],updates);
return next;
});
},[]);
const toggleAction=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
const list=who==='couple'?next.couple.actions:next[who].actions;
const idx=list.findIndex(a=>a.id===id);
if(idx>=0)list[idx].done=!list[idx].done;
return next;
});
},[]);
const deleteObj=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.objectives=next.couple.objectives.filter(o=>o.id!==id);
else next[who].objectives=next[who].objectives.filter(o=>o.id!==id);
return next;
});
},[]);
const addObjective=useCallback((who,title,desc,cat)=>{
setData(prev=>{
const next=clone(prev);
const obj={id:Date.now().toString(),cat,title,desc,progress:0,done:false};
if(who==='couple')next.couple.objectives.push(obj);
else next[who].objectives.push(obj);
return next;
});
},[]);
const addAction=useCallback((who,text,_,cat)=>{
setData(prev=>{
const next=clone(prev);
const act={id:Date.now().toString(),text,cat,done:false};
if(who==='couple')next.couple.actions.push(act);
else next[who].actions.push(act);
return next;
});
},[]);
const addNote=useCallback((who,text)=>{
if(!text.trim())return;
setData(prev=>{
const next=clone(prev);
const note={id:Date.now().toString(),text:text.trim(),date:new Date().toISOString()};
if(who==='couple')next.couple.notes=[note,...(next.couple.notes||[])];
else next[who].notes=[note,...(next[who].notes||[])];
return next;
});
},[]);
const deleteNote=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.notes=(next.couple.notes||[]).filter(n=>n.id!==id);
else next[who].notes=(next[who].notes||[]).filter(n=>n.id!==id);
return next;
});
},[]);
const upsertMeal=useCallback((who,meal)=>{
setData(prev=>{
const next=clone(prev);
const src=next[who]?.meals||next.couple?.meals||[];
const idx=src.findIndex(m=>m.id===meal.id);
if(idx>=0)src[idx]=meal; else src.push(meal);
return next;
});
},[]);
const deleteMeal=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.meals=(next.couple.meals||[]).filter(m=>m.id!==id);
else next[who].meals=(next[who].meals||[]).filter(m=>m.id!==id);
return next;
});
},[]);
const upsertBudgetLine=useCallback((who,type,line)=>{
setData(prev=>{
const next=clone(prev);
const src=who==='couple'?next.couple.budget:next[who].budget;
const arr=src[type];
const idx=arr.findIndex(l=>l.id===line.id);
if(idx>=0)arr[idx]=line; else arr.push(line);
return next;
});
},[]);
const deleteBudgetLine=useCallback((who,type,id)=>{
setData(prev=>{
const next=clone(prev);
const src=who==='couple'?next.couple.budget:next[who].budget;
src[type]=src[type].filter(l=>l.id!==id);
return next;
});
},[]);
const updateVision=useCallback((who,text)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.vision=text;
else next[who].vision=text;
return next;
});
},[]);
const upsertSport=useCallback((who,item)=>{
setData(prev=>{
const next=clone(prev);
const src=who==='couple'?next.couple.sport:(next[who].sport||[]);
const idx=src.findIndex(s=>s.id===item.id);
if(idx>=0)src[idx]=item; else src.push(item);
if(who==='couple')next.couple.sport=src; else next[who].sport=src;
return next;
});
},[]);
const deleteSport=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.sport=(next.couple.sport||[]).filter(s=>s.id!==id);
else next[who].sport=(next[who].sport||[]).filter(s=>s.id!==id);
return next;
});
},[]);

const {totalObj,totalDone,avgProgress,totalActions,actionsDone}=useMemo(()=>{
const totalObj=[...data.dja.objectives,...data.liika.objectives,...data.couple.objectives];
const totalDone=totalObj.filter(o=>o.done).length;
const avgProgress=totalObj.length?Math.round(totalObj.reduce((s,o)=>s+o.progress,0)/totalObj.length):0;
const totalActions=[...data.dja.actions,...data.liika.actions,...data.couple.actions];
const actionsDone=totalActions.filter(a=>a.done).length;
return {totalObj,totalDone,avgProgress,totalActions,actionsDone};
},[data]);

<p className="eyebrow" style={{marginBottom:12}}>▸ Actions</p>

{person.actions.map(a=><ActionItem key={a.id} action={a} color={color} onToggle={id=>toggleAction(who,id)}/>)}

<NotesPanel who={who} notes={person.notes} onAdd={addNote} onDelete={deleteNote}/>
</div>
};
