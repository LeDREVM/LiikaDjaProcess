// ─── Supabase ───
const SB_URL='https://mvtwotbyphuxdkcwgime.supabase.co';
const SB_KEY='sb_publishable_3GTu11_-nrnYDyFY2Rl7eQ_bndRXVAz';
const sb=supabase.createClient(SB_URL,SB_KEY);
async function sbLoad(){
try{
  const {data,error}=await sb.from('app_state').select('data').eq('id','main').single();
  if(error&&error.code==='PGRST116')return null; // no row yet
  if(error)throw error;
  return data?.data||null;
}catch(e){console.warn('[Supabase] load error:',e);return null}
}
async function sbSave(d){
try{
  const {error}=await sb.from('app_state').upsert({id:'main',data:d,updated_at:new Date().toISOString()});
  if(error)throw error;
  return true;
}catch(e){console.warn('[Supabase] save error:',e);return false}
}

// ─── Components ───

function ProgressRing({pct,size=48,stroke=4,color}){
const r=(size-stroke)/2;const circ=2*Math.PI*r;const off=circ-pct/100*circ;
return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border2)" strokeWidth={stroke}/>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset .5s ease'}}/>
</svg>
}

function StatCard({label,value,color,icon}){
return <div style={{background:'var(--bg3)',borderRadius:'var(--radius)',padding:'16px 20px',display:'flex',alignItems:'center',gap:14}}>
<div style={{width:40,height:40,borderRadius:10,background:accentBg[color],display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div>
<div><div style={{fontSize:13,color:'var(--text3)',marginBottom:2}}>{label}</div>
<div style={{fontSize:22,fontWeight:600}}>{value}</div></div>
</div>
}

function ChartPanel({data}){
const canvasRef=useRef(null);
const chartRef=useRef(null);
useEffect(()=>{
if(!canvasRef.current)return;
if(chartRef.current)chartRef.current.destroy();
const all=[...data.dja.objectives,...data.liika.objectives,...data.couple.objectives];
const cats=[...new Set(all.map(o=>o.cat))];
const avgByCat=cats.map(c=>{const items=all.filter(o=>o.cat===c);return Math.round(items.reduce((s,i)=>s+i.progress,0)/items.length)});
chartRef.current=new Chart(canvasRef.current,{
type:'bar',
data:{labels:cats,datasets:[{data:avgByCat,backgroundColor:['#8b5cf6','#34d399','#fbbf24','#f472b6','#60a5fa'],borderRadius:8,barPercentage:.6}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
y:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6e6a80',font:{family:'Outfit'}}},
x:{grid:{display:false},ticks:{color:'#a8a4b8',font:{family:'Outfit',weight:500}}}
}}
});
return ()=>{if(chartRef.current)chartRef.current.destroy()};
},[data]);
return <div style={{position:'relative',height:260}}><canvas ref={canvasRef}/></div>
}

function DoughnutPanel({data,who}){
const canvasRef=useRef(null);
const chartRef=useRef(null);
useEffect(()=>{
if(!canvasRef.current)return;
if(chartRef.current)chartRef.current.destroy();
const src=who==='couple'?data.couple.objectives:data[who].objectives;
const done=src.filter(o=>o.done).length;
const inProgress=src.filter(o=>!o.done&&o.progress>0).length;
const notStarted=src.filter(o=>!o.done&&o.progress===0).length;
chartRef.current=new Chart(canvasRef.current,{
type:'doughnut',
data:{labels:['Termines','En cours','A faire'],datasets:[{data:[done,inProgress,notStarted],backgroundColor:['#34d399','#8b5cf6','#2a2a3a'],borderWidth:0}]},
options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false}}}
});
return ()=>{if(chartRef.current)chartRef.current.destroy()};
},[data,who]);
return <div style={{position:'relative',height:200}}><canvas ref={canvasRef}/></div>
}

// ─── Main App ───
function App(){
const [data,setData]=useState(loadData);
const [view,setView]=useState('dashboard');
const [modal,setModal]=useState(null);
const [syncStatus,setSyncStatus]=useState('idle'); // idle | syncing | ok | error

// Sync to Supabase on data change (debounced 1.2s)
const syncTimer=useRef(null);
useEffect(()=>{
  saveData(data);
  clearTimeout(syncTimer.current);
  syncTimer.current=setTimeout(async()=>{
    setSyncStatus('syncing');
    const ok=await sbSave(data);
    setSyncStatus(ok?'ok':'error');
    if(ok)setTimeout(()=>setSyncStatus('idle'),2000);
  },1200);
},[data]);

// Load from Supabase on mount
useEffect(()=>{
  setSyncStatus('syncing');
  sbLoad().then(d=>{
    if(d){setData(d);setSyncStatus('ok');setTimeout(()=>setSyncStatus('idle'),2000);}
    else setSyncStatus('idle');
  }).catch(()=>setSyncStatus('error'));
},[]);

const clone=prev=>structuredClone(prev);

const updateObj=useCallback((who,id,updates)=>{
setData(prev=>{
const next=clone(prev);
const list=who==='couple'?next.couple.objectives:next[who].objectives;
const idx=list.findIndex(o=>o.id===id);
if(idx>=0)Object.assign(list[idx],updates);
return next;
});
},[]);
const toggleAction=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
const list=who==='couple'?next.couple.actions:next[who].actions;
const idx=list.findIndex(a=>a.id===id);
if(idx>=0)list[idx].done=!list[idx].done;
return next;
});
},[]);
const deleteObj=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.objectives=next.couple.objectives.filter(o=>o.id!==id);
else next[who].objectives=next[who].objectives.filter(o=>o.id!==id);
return next;
});
},[]);
const addObjective=useCallback((who,title,desc,cat)=>{
setData(prev=>{
const next=clone(prev);
const obj={id:Date.now().toString(),cat,title,desc,progress:0,done:false};
if(who==='couple')next.couple.objectives.push(obj);
else next[who].objectives.push(obj);
return next;
});
},[]);
const addAction=useCallback((who,text,_,cat)=>{
setData(prev=>{
const next=clone(prev);
const act={id:Date.now().toString(),text,cat,done:false};
if(who==='couple')next.couple.actions.push(act);
else next[who].actions.push(act);
return next;
});
},[]);
const addNote=useCallback((who,text)=>{
if(!text.trim())return;
setData(prev=>{
const next=clone(prev);
const note={id:Date.now().toString(),text:text.trim(),date:new Date().toISOString()};
if(who==='couple')next.couple.notes=[note,...(next.couple.notes||[])];
else next[who].notes=[note,...(next[who].notes||[])];
return next;
});
},[]);
const deleteNote=useCallback((who,id)=>{
setData(prev=>{
const next=clone(prev);
if(who==='couple')next.couple.notes=(next.couple.notes||[]).filter(n=>n.id!==id);
else next[who].notes=(next[who].notes||[]).filter(n=>n.id!==id);
return next;
});
},[]);

const {totalObj,totalDone,avgProgress,totalActions,actionsDone}=useMemo(()=>{
const totalObj=[...data.dja.objectives,...data.liika.objectives,...data.couple.objectives];
const totalDone=totalObj.filter(o=>o.done).length;
const avgProgress=totalObj.length?Math.round(totalObj.reduce((s,o)=>s+o.progress,0)/totalObj.length):0;
const totalActions=[...data.dja.actions,...data.liika.actions,...data.couple.actions];
const actionsDone=totalActions.filter(a=>a.done).length;
return {totalObj,totalDone,avgProgress,totalActions,actionsDone};
},[data]);

{id:'dashboard',label:'Dashboard',icon:'◈'},
{id:'dja',label:'Dja',icon:'◆'},
{id:'liika',label:'Liika',icon:'◇'},
{id:'couple',label:'Couple',icon:'♡'},
{id:'charts',label:'Stats',icon:'▤'},
];

const renderPerson=(who)=>{
const person=data[who];
const color=who;
return <div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:12}}>
<div>
<h2 style={{fontSize:22,fontWeight:600,fontFamily:"'Playfair Display',serif"}}>{person.name}</h2>
<p style={{fontSize:14,color:'var(--text3)',marginTop:2}}>{person.role}{person.location?` — ${person.location}`:''}</p>
</div>
<div style={{display:'flex',gap:8}}>
<button onClick={()=>setModal({type:'objective',who})} style={{padding:'8px 16px',borderRadius:'var(--radius-sm)',border:'none',background:accent[who],color:'#fff',cursor:'pointer',fontSize:13,fontWeight:500}}>+ Objectif</button>
<button onClick={()=>setModal({type:'action',who})} style={{padding:'8px 16px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border2)',background:'transparent',color:'var(--text2)',cursor:'pointer',fontSize:13}}>+ Action</button>
</div>
</div>
<div style={{display:'grid',gap:12,marginBottom:28}}>
{person.objectives.map(o=><ObjectiveCard key={o.id} obj={o} color={color}
  onToggle={id=>updateObj(who,id,{done:!o.done,progress:!o.done?100:o.progress})}
  onProgress={(id,p)=>updateObj(who,id,{progress:p,done:p>=100})}
  onDelete={id=>deleteObj(who,id)}/>)}
</div>
<h3 style={{fontSize:16,fontWeight:500,marginBottom:12,color:'var(--text2)'}}>Actions</h3>
<div style={{display:'grid',gap:8}}>
{person.actions.map(a=><ActionItem key={a.id} action={a} color={color} onToggle={id=>toggleAction(who,id)}/>)}
</div>
<NotesPanel who={who} notes={person.notes} onAdd={addNote} onDelete={deleteNote}/>
</div>
};

const renderCouple=()=>{
return <div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:12}}>
<div>
<h2 style={{fontSize:22,fontWeight:600,fontFamily:"'Playfair Display',serif"}}>Dja & Liika</h2>
<p style={{fontSize:14,color:'var(--text3)',marginTop:2}}>Lanmou Douvan — Vision commune</p>
</div>
<div style={{display:'flex',gap:8}}>
<button onClick={()=>setModal({type:'objective',who:'couple'})} style={{padding:'8px 16px',borderRadius:'var(--radius-sm)',border:'none',background:'var(--accent-couple)',color:'var(--bg)',cursor:'pointer',fontSize:13,fontWeight:500}}>+ Objectif</button>
<button onClick={()=>setModal({type:'action',who:'couple'})} style={{padding:'8px 16px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border2)',background:'transparent',color:'var(--text2)',cursor:'pointer',fontSize:13}}>+ Action</button>
</div>
</div>
<div style={{display:'grid',gap:12,marginBottom:28}}>
{data.couple.objectives.map(o=><ObjectiveCard key={o.id} obj={o} color="couple"
  onToggle={id=>updateObj('couple',id,{done:!o.done,progress:!o.done?100:o.progress})}
  onProgress={(id,p)=>updateObj('couple',id,{progress:p,done:p>=100})}
  onDelete={id=>deleteObj('couple',id)}/>)}
</div>
<h3 style={{fontSize:16,fontWeight:500,marginBottom:12,color:'var(--text2)'}}>Actions</h3>
<div style={{display:'grid',gap:8}}>
{data.couple.actions.map(a=><ActionItem key={a.id} action={a} color="couple" onToggle={id=>toggleAction('couple',id)}/>)}
</div>
<NotesPanel who="couple" notes={data.couple.notes} onAdd={addNote} onDelete={deleteNote}/>
</div>
};

const renderDashboard=()=>{
return <div>
<div style={{marginBottom:28}}>
<h2 style={{fontSize:26,fontWeight:600,fontFamily:"'Playfair Display',serif",marginBottom:4}}>Tableau de bord</h2>
<p style={{fontSize:14,color:'var(--text3)'}}>Vue d'ensemble — Vision 2026-2036</p>
</div>
<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:28}}>
<StatCard label="Progression moyenne" value={`${avgProgress}%`} color="dja" icon="◈"/>
<StatCard label="Objectifs termines" value={`${totalDone}/${totalObj.length}`} color="liika" icon="✓"/>
<StatCard label="Actions faites" value={`${actionsDone}/${totalActions.length}`} color="couple" icon="▸"/>
</div>

<h3 style={{fontSize:16,fontWeight:500,marginBottom:16,color:'var(--text2)'}}>Cote a cote</h3>
<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16,marginBottom:28}}>
{['dja','liika'].map(who=>{
const p=data[who];
const avg=p.objectives.length?Math.round(p.objectives.reduce((s,o)=>s+o.progress,0)/p.objectives.length):0;
const av=accent[who];
return <div key={who} style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:20,border:`1px solid ${accentBorder[who]}`}}>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
<div>
<div style={{fontSize:16,fontWeight:600}}>{p.name}</div>
<div style={{fontSize:12,color:'var(--text3)'}}>{p.role}</div>
</div>
<div style={{position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
<ProgressRing pct={avg} size={56} stroke={5} color={av}/>
<span style={{position:'absolute',fontSize:13,fontWeight:600}}>{avg}%</span>
</div>
</div>
{p.objectives.slice(0,3).map(o=><div key={o.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
<div style={{width:6,height:6,borderRadius:3,background:o.done?'var(--success)':av,minWidth:6}}/>
<span style={{fontSize:13,color:o.done?'var(--text3)':'var(--text)',flex:1,textDecoration:o.done?'line-through':'none'}}>{o.title}</span>
<span style={{fontSize:11,color:'var(--text3)'}}>{o.progress}%</span>
</div>)}
<button onClick={()=>setView(who)} style={{marginTop:12,width:'100%',padding:'8px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border2)',background:'transparent',color:'var(--text2)',cursor:'pointer',fontSize:13}}>Voir tout →</button>
</div>})}
</div>

<div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:20,border:'1px solid var(--accent-couple-border)',marginBottom:28}}>
<div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Objectifs couple</div>
<div style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>Lanmou Douvan — projets communs</div>
{data.couple.objectives.map(o=><div key={o.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
<div style={{width:6,height:6,borderRadius:3,background:o.done?'var(--success)':'var(--accent-couple)',minWidth:6}}/>
<span style={{fontSize:13,color:o.done?'var(--text3)':'var(--text)',flex:1}}>{o.title}</span>
<span style={{fontSize:11,color:'var(--text3)'}}>{o.progress}%</span>
</div>)}
<button onClick={()=>setView('couple')} style={{marginTop:12,width:'100%',padding:'8px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border2)',background:'transparent',color:'var(--text2)',cursor:'pointer',fontSize:13}}>Voir tout →</button>
</div>
</div>
};

const renderCharts=()=>{
return <div>
<h2 style={{fontSize:22,fontWeight:600,fontFamily:"'Playfair Display',serif",marginBottom:4}}>Statistiques</h2>
<p style={{fontSize:14,color:'var(--text3)',marginBottom:24}}>Progression par categorie et par personne</p>
<div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:20,marginBottom:20,border:'1px solid var(--border)'}}>
<h3 style={{fontSize:15,fontWeight:500,marginBottom:16}}>Progression moyenne par categorie</h3>
<ChartPanel data={data}/>
</div>
<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:16}}>
{['dja','liika','couple'].map(who=>{
const label=who==='dja'?'Dja':who==='liika'?'Liika':'Couple';
const col=who==='dja'?'var(--accent-dja)':who==='liika'?'var(--accent-liika)':'var(--accent-couple)';
return <div key={who} style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:20,border:'1px solid var(--border)'}}>
<h3 style={{fontSize:15,fontWeight:500,marginBottom:16}}>{label}</h3>
<DoughnutPanel data={data} who={who}/>
<div style={{display:'flex',justifyContent:'center',gap:16,marginTop:12,fontSize:12,color:'var(--text3)'}}>
<span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'#34d399',display:'inline-block'}}/> Fait</span>
<span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'#8b5cf6',display:'inline-block'}}/> En cours</span>
<span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'#2a2a3a',display:'inline-block'}}/> A faire</span>
</div>
</div>})}
</div>
</div>
};

return <div style={{display:'flex',minHeight:'100vh'}}>
{/* Sidebar */}
<nav style={{width:220,minWidth:220,background:'var(--bg2)',borderRight:'1px solid var(--border)',padding:'24px 0',display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh'}}>
<div style={{padding:'0 20px',marginBottom:32}}>
<div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:600,letterSpacing:'-0.02em'}}>
<span style={{color:'var(--accent-dja)'}}>Lanmou</span> <span style={{color:'var(--accent-liika)'}}>Douvan</span>
</div>
<div style={{fontSize:11,color:'var(--text3)',marginTop:4,letterSpacing:'.05em',textTransform:'uppercase'}}>Mix Vibz</div>
</div>
<div style={{flex:1}}>
{navItems.map(n=><button key={n.id} onClick={()=>setView(n.id)}
style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 20px',border:'none',background:view===n.id?'var(--bg3)':'transparent',color:view===n.id?'var(--text)':'var(--text3)',fontSize:14,fontWeight:view===n.id?500:400,cursor:'pointer',borderLeft:view===n.id?'2px solid var(--accent-dja)':'2px solid transparent',transition:'all .15s'}}>
<span style={{fontSize:16,width:20,textAlign:'center'}}>{n.icon}</span>{n.label}
</button>)}
</div>
<div style={{padding:'0 20px',display:'flex',flexDirection:'column',gap:8}}>
{/* Supabase sync status */}
<div style={{display:'flex',alignItems:'center',gap:6,padding:'7px 10px',borderRadius:'var(--radius-sm)',border:'1px solid var(--accent-dja-border)',background:'var(--accent-dja-bg)'}}>
<span style={{fontSize:13}}>🗄</span>
<span style={{fontSize:12,color:'var(--accent-dja2)',flex:1}}>Supabase</span>
<span style={{fontSize:10,fontWeight:500,color:syncStatus==='ok'?'var(--success)':syncStatus==='error'?'#f87171':syncStatus==='syncing'?'var(--accent-couple)':'var(--text3)'}}>
{syncStatus==='ok'?'✓ sync':syncStatus==='error'?'✗ erreur':syncStatus==='syncing'?'sync…':'prêt'}
</span>
</div>
<button onClick={()=>{if(confirm('Réinitialiser toutes les données ?')){localStorage.removeItem('dja-liika-goals');setData(defaultData)}}}
style={{width:'100%',padding:'8px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border2)',background:'transparent',color:'var(--text3)',cursor:'pointer',fontSize:12}}>Réinitialiser</button>
</div>
</nav>

{/* Mobile nav */}
<div className="mobile-nav" style={{display:'none',position:'fixed',bottom:0,left:0,right:0,background:'var(--bg2)',borderTop:'1px solid var(--border)',padding:'8px 0',zIndex:50}}>
<div style={{display:'flex',justifyContent:'space-around'}}>
{navItems.map(n=><button key={n.id} onClick={()=>setView(n.id)}
style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,border:'none',background:'transparent',color:view===n.id?'var(--accent-dja)':'var(--text3)',cursor:'pointer',padding:'4px 8px',fontSize:10}}>
<span style={{fontSize:18}}>{n.icon}</span>{n.label}
</button>)}
</div>
</div>

{/* Main */}
<main style={{flex:1,padding:'32px 40px',maxWidth:900,minWidth:0}}>
{view==='dashboard'&&renderDashboard()}
{view==='dja'&&renderPerson('dja')}
{view==='liika'&&renderPerson('liika')}
{view==='couple'&&renderCouple()}
{view==='charts'&&renderCharts()}
</main>

<AddModal show={!!modal} onClose={()=>setModal(null)} type={modal?.type} color={modal?.who}
  onAdd={(t,d,c)=>{
    if(modal.type==='objective')addObjective(modal.who,t,d,c);
    else addAction(modal.who,t,d,c);
  }}/>

</div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
